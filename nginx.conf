server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA Fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # 🔹 Proxy Backend chính (port 5000)
  location /api/ {
    proxy_pass http://host.docker.internal:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
  }

  # 🔹 Proxy Frigate (giả sử chạy cùng máy hoặc IP nội bộ)
  location /frigate/ {
    # Thay <FRIGATE_IP> bằng IP thực tế của máy chạy Frigate
    proxy_pass http://<FRIGATE_IP>:5000/; 
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Frigate thường dùng WebSocket cho camera stream & events
    location /frigate/ws {
      proxy_pass http://<FRIGATE_IP>:5000/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # 🔹 MQTT WebSocket (nếu backend không expose trực tiếp)
  location /mqtt/ {
    proxy_pass http://host.docker.internal:8083/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}